name: conda
dependencies:
  - archspec >=0.2.3
  - boltons >=23.0.0
  - charset-normalizer
  - conda-forge::pytest-codspeed >=3.0.0
  - conda-libmamba-solver >=26.4.0
  - conda-package-handling >=2.2.0
  - distro >=1.5.0
  - frozendict >=2.4.2
  - menuinst >=2
  - packaging >=23.0
  - platformdirs >=3.10.0
  - pluggy >=1.6.0
  - pycosat >=0.6.3
  - python >=3.10
  - requests >=2.28.0,<3
  - ruamel.yaml >=0.11.14,<0.19
  - setuptools >=60.0.0
  - setuptools_scm
  - tqdm >=4
  - zstandard >=0.15
  - conda-forge::xonsh[when=__linux]
  - patchelf[when=__linux]
  - pywin32[when=__win]
extras:
  ci:
    - conda[when=__win]  # for Windows shell activation tests
    - coverage
    - flask >=2.2  # package server pytest fixture
    - git
    - importlib_resources>=5.10[when="python<3.12"]
    - pexpect
    - pip
    - pytest
    - pytest-cov
    - pytest-mock
    - pytest-rerunfailures
    - pytest-split
    - pytest-timeout
    - pytest-xprocess
    - responses
    - tomli[when="python<3.11"]  # for coverage pyproject.toml
    - truststore >=0.8.0
    - werkzeug >=2.2  # package server pytest fixture
  s3:
    - boto3 !=1.33.0
    - conda-forge::minio-server
  typing:
    - lxml
    - mypy
