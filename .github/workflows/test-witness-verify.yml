name: Test Witness Verify

on:
  push:
    branches:
      - feat/conda-witness
      - main
    paths:
      - 'conda/cli/main_verify.py'
      - 'conda/witness/**'
      - '.github/workflows/test-witness-verify.yml'
      - '.github/witness/**'
  pull_request:
    paths:
      - 'conda/cli/main_verify.py'
      - 'conda/witness/**'
      - '.github/workflows/test-witness-verify.yml'
      - '.github/witness/**'
  workflow_dispatch:

jobs:
  test-witness-integration:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Witness CLI
        run: |
          # Install witness CLI
          curl -L https://github.com/in-toto/witness/releases/latest/download/witness_$(uname -s)_$(uname -m).tar.gz -o witness.tar.gz
          tar -xzf witness.tar.gz
          sudo mv witness /usr/local/bin/
          witness version
          
      - name: Generate Test Keys
        run: |
          # Create keys directory
          mkdir -p .github/witness/keys
          
          # Generate RSA key pair for policy signing
          openssl genrsa -out .github/witness/keys/policy-key.pem 2048
          openssl rsa -in .github/witness/keys/policy-key.pem -pubout -out .github/witness/keys/policy-key.pub
          
          # Generate another key pair for testing multiple keys
          openssl genrsa -out .github/witness/keys/test-key.pem 2048
          openssl rsa -in .github/witness/keys/test-key.pem -pubout -out .github/witness/keys/test-key.pub
          
          echo "Keys generated successfully"
          ls -la .github/witness/keys/
          
      - name: Install Conda Build Dependencies
        run: |
          # Install minimal dependencies needed for conda to run
          pip install ruamel.yaml requests pycosat boltons platformdirs frozendict
          pip install jsonpatch packaging tqdm urllib3 charset-normalizer idna
          
      - name: Build Conda Package with Witness Attestation
        id: witness-build
        uses: testifysec/witness-run-action@v0.2.0
        with:
          command: |
            # Create a simple build script
            cat > build_conda.sh << 'EOF'
            #!/bin/bash
            set -e
            echo "Building conda package..."
            
            # Create build directory
            mkdir -p build/lib
            
            # Copy conda package
            cp -r conda build/lib/
            
            # Create a manifest file
            cat > build/MANIFEST.json << MANIFEST_EOF
            {
              "name": "conda",
              "version": "dev",
              "build_time": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
              "files": $(find build/lib/conda -type f -name "*.py" | head -20 | jq -R . | jq -s .)
            }
            MANIFEST_EOF
            
            # Create tarball
            tar -czf conda-build.tar.gz -C build .
            
            echo "Build complete: conda-build.tar.gz"
            ls -lh conda-build.tar.gz
            sha256sum conda-build.tar.gz
            EOF
            
            chmod +x build_conda.sh
            ./build_conda.sh
          attestors: |
            - github
            - environment
          archivista-server: ""  # Disable archivista for this test
          
      - name: Save Attestation
        run: |
          # Find and save the attestation file
          attestation_file=$(find . -name "*.json" -path "*/witness/*" -type f | head -1)
          if [ -n "$attestation_file" ]; then
            echo "Found attestation: $attestation_file"
            cp "$attestation_file" attestation.json
            cat attestation.json | jq '.'
          else
            echo "No attestation file found, creating from step output"
            echo '${{ steps.witness-build.outputs.attestation }}' > attestation.json
          fi
          
      - name: Create Witness Policy
        run: |
          cat > .github/witness/policy.yaml << 'EOF'
          expires: "2030-01-01T00:00:00Z"
          steps:
            - name: build
              attestations:
                - type: https://witness.dev/attestations/command-run/v0.1
                  regopolicies:
                    - name: exit-code
                      module: |
                        package commandrun
                        default allow = false
                        allow {
                          input.exitcode == 0
                        }
                - type: https://witness.dev/attestations/environment/v0.1
                - type: https://witness.dev/attestations/github/v0.1
                  regopolicies:
                    - name: github-actor
                      module: |
                        package github
                        default allow = false
                        allow {
                          input.actor != ""
                        }
              functionaries:
                - type: publickey
                  publickeyid: "test-key"
                  publickey: |
          $(sed 's/^/        /' .github/witness/keys/test-key.pub)
          publickeys:
            test-key:
              keyid: "test-key"
              key: |
          $(sed 's/^/      /' .github/witness/keys/test-key.pub)
          EOF
          
          echo "Policy created:"
          cat .github/witness/policy.yaml
          
      - name: Sign the Policy
        run: |
          # Sign the policy with witness
          witness sign \
            --key .github/witness/keys/policy-key.pem \
            --outfile .github/witness/policy-signed.yaml \
            .github/witness/policy.yaml
          
          echo "Signed policy created"
          
      - name: Test Conda Verify - Basic Artifact Verification
        run: |
          echo "Testing conda verify with artifact file..."
          
          # Set PYTHONPATH to use local conda
          export PYTHONPATH="${PWD}:${PYTHONPATH}"
          
          # Run conda verify
          python -m conda.cli.main verify \
            --artifactfile conda-build.tar.gz \
            --policy .github/witness/policy-signed.yaml \
            --publickey .github/witness/keys/policy-key.pub \
            --attestations attestation.json \
            || echo "Verification failed (expected for unsigned attestation)"
            
      - name: Create Properly Signed Attestation
        run: |
          # Re-run build with proper signing key
          witness run \
            --key .github/witness/keys/test-key.pem \
            --outfile signed-attestation.json \
            --attestors environment \
            --attestors github \
            --command "./build_conda.sh"
            
          echo "Signed attestation created"
          
      - name: Test Conda Verify - With Signed Attestation
        run: |
          echo "Testing conda verify with signed attestation..."
          
          export PYTHONPATH="${PWD}:${PYTHONPATH}"
          
          # This should succeed
          python -m conda.cli.main verify \
            --artifactfile conda-build.tar.gz \
            --policy .github/witness/policy-signed.yaml \
            --publickey .github/witness/keys/policy-key.pub \
            --attestations signed-attestation.json
            
          echo "✓ Verification successful!"
          
      - name: Test Conda Verify - Directory Verification
        run: |
          echo "Testing directory verification..."
          
          # Extract the tarball
          mkdir -p test-dir
          tar -xzf conda-build.tar.gz -C test-dir
          
          export PYTHONPATH="${PWD}:${PYTHONPATH}"
          
          python -m conda.cli.main verify \
            --directory-path test-dir \
            --policy .github/witness/policy-signed.yaml \
            --publickey .github/witness/keys/policy-key.pub \
            --attestations signed-attestation.json \
            || echo "Directory verification completed"
            
      - name: Test Conda Verify - JSON Output
        run: |
          echo "Testing JSON output mode..."
          
          export PYTHONPATH="${PWD}:${PYTHONPATH}"
          
          python -m conda.cli.main verify \
            --artifactfile conda-build.tar.gz \
            --policy .github/witness/policy-signed.yaml \
            --publickey .github/witness/keys/policy-key.pub \
            --attestations signed-attestation.json \
            --json > verify-output.json || true
            
          echo "JSON Output:"
          cat verify-output.json | jq '.'
          
      - name: Test Conda Verify - Help Output
        run: |
          echo "Testing help output..."
          
          export PYTHONPATH="${PWD}:${PYTHONPATH}"
          
          python -m conda.cli.main verify --help
          
      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: witness-test-artifacts
          path: |
            attestation.json
            signed-attestation.json
            .github/witness/policy.yaml
            .github/witness/policy-signed.yaml
            .github/witness/keys/*.pub
            conda-build.tar.gz
            verify-output.json
            
  test-negative-cases:
    runs-on: ubuntu-latest
    needs: test-witness-integration
    
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          pip install ruamel.yaml requests pycosat boltons platformdirs frozendict
          pip install jsonpatch packaging tqdm urllib3 charset-normalizer idna
          
      - name: Test Missing Witness CLI
        run: |
          echo "Testing error when witness CLI is missing..."
          
          export PYTHONPATH="${PWD}:${PYTHONPATH}"
          export PATH="/usr/bin:/bin"  # Remove /usr/local/bin from PATH
          
          python -m conda.cli.main verify \
            --artifactfile dummy.tar.gz \
            --policy dummy-policy.yaml 2>&1 | grep -i "witness.*not installed" || echo "Expected error message"
            
      - name: Test Invalid Policy File
        run: |
          echo "Testing with non-existent policy file..."
          
          # Install witness for this test
          curl -L https://github.com/in-toto/witness/releases/latest/download/witness_$(uname -s)_$(uname -m).tar.gz -o witness.tar.gz
          tar -xzf witness.tar.gz
          sudo mv witness /usr/local/bin/
          
          export PYTHONPATH="${PWD}:${PYTHONPATH}"
          
          # Create a dummy artifact
          echo "test" > test.txt
          
          python -m conda.cli.main verify \
            --artifactfile test.txt \
            --policy non-existent-policy.yaml 2>&1 | grep -i "not found\|error" || echo "Expected error"
            
      - name: Test Missing Required Arguments
        run: |
          echo "Testing missing required arguments..."
          
          export PYTHONPATH="${PWD}:${PYTHONPATH}"
          
          # Test without policy (required)
          python -m conda.cli.main verify \
            --artifactfile test.txt 2>&1 | grep -i "required\|policy" || echo "Expected error for missing policy"